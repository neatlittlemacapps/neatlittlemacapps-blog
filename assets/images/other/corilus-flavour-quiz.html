<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Flavour Quiz — Scaling Design Decisions</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: #ffffff;
    color: #3f3f46;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
  }

  .quiz-container {
    max-width: 680px;
    width: 100%;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    color: #09090b;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 14px;
    color: #a1a1aa;
    margin-bottom: 48px;
    line-height: 1.5;
  }

  /* Progress bar */
  .progress-track {
    width: 100%;
    height: 4px;
    background: #f4f4f5;
    border-radius: 2px;
    margin-bottom: 40px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #0d9488;
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Step indicators */
  .steps {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
  }
  .step-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.3s ease;
    border: 2px solid #e4e4e7;
    color: #a1a1aa;
    background: #ffffff;
  }
  .step-dot.active {
    border-color: #0d9488;
    color: #0d9488;
    background: #f0fdfa;
  }
  .step-dot.done {
    border-color: #0d9488;
    background: #0d9488;
    color: #ffffff;
  }

  /* Question */
  .question-area {
    min-height: 360px;
  }
  .question-label {
    font-size: 11px;
    font-weight: 600;
    color: #a1a1aa;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .question-text {
    font-size: 22px;
    font-weight: 600;
    color: #18181b;
    margin-bottom: 28px;
    line-height: 1.3;
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option {
    padding: 16px 20px;
    border: 1px solid #e4e4e7;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 14px;
    background: #ffffff;
  }
  .option:hover {
    border-color: #0d9488;
    background: #f0fdfa;
  }
  .option.selected {
    border-color: #0d9488;
    background: #f0fdfa;
    box-shadow: 0 0 0 1px #0d9488;
  }
  .option-radio {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid #d4d4d8;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }
  .option.selected .option-radio {
    border-color: #0d9488;
  }
  .option.selected .option-radio::after {
    content: "";
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #0d9488;
  }
  .option-content {
    flex: 1;
  }
  .option-title {
    font-size: 15px;
    font-weight: 600;
    color: #18181b;
    margin-bottom: 2px;
  }
  .option-desc {
    font-size: 13px;
    color: #71717a;
    line-height: 1.4;
  }

  /* Navigation */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 32px;
  }
  .btn {
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    border: none;
  }
  .btn-back {
    background: transparent;
    color: #71717a;
    border: 1px solid #e4e4e7;
  }
  .btn-back:hover { background: #f4f4f5; }
  .btn-next {
    background: #0d9488;
    color: #ffffff;
  }
  .btn-next:hover { background: #0f766e; }
  .btn-next:disabled {
    background: #d4d4d8;
    cursor: not-allowed;
  }
  .btn-restart {
    background: transparent;
    color: #0d9488;
    border: 1px solid #0d9488;
    margin-top: 24px;
  }
  .btn-restart:hover { background: #f0fdfa; }

  /* Result card */
  .result {
    display: none;
  }
  .result.visible {
    display: block;
  }

  .result-header {
    text-align: center;
    margin-bottom: 36px;
  }
  .result-header h2 {
    font-size: 24px;
    font-weight: 700;
    color: #18181b;
    margin-bottom: 8px;
  }
  .result-header p {
    font-size: 14px;
    color: #71717a;
    line-height: 1.5;
  }

  .config-card {
    border: 1px solid #e4e4e7;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .config-card-header {
    background: #fafafa;
    padding: 14px 20px;
    border-bottom: 1px solid #e4e4e7;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #52525b;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .config-card-body {
    padding: 20px;
  }

  .calibration-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 0;
  }
  .calibration-row + .calibration-row {
    border-top: 1px solid #f4f4f5;
  }
  .calibration-label {
    width: 140px;
    font-size: 13px;
    font-weight: 600;
    color: #18181b;
    flex-shrink: 0;
  }
  .calibration-bar-track {
    flex: 1;
    height: 8px;
    background: #f4f4f5;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  .calibration-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
  }
  .calibration-value {
    width: 90px;
    font-size: 12px;
    font-weight: 600;
    text-align: right;
    flex-shrink: 0;
  }

  /* Pattern chips */
  .pattern-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }
  .pattern-chip {
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 6px;
    background: #f0fdfa;
    color: #0d9488;
    border: 1px solid #99f6e4;
  }
  .pattern-chip.warn {
    background: #fffbeb;
    color: #92400e;
    border-color: #fde68a;
  }
  .pattern-chip.danger {
    background: #fef2f2;
    color: #991b1b;
    border-color: #fecaca;
  }

  .constraint-note {
    margin-top: 16px;
    padding: 14px 18px;
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: 8px;
    font-size: 13px;
    color: #92400e;
    line-height: 1.5;
  }

  .takeaway {
    margin-top: 32px;
    padding: 20px;
    background: #f0fdfa;
    border: 1px solid #99f6e4;
    border-radius: 10px;
    text-align: center;
  }
  .takeaway p {
    font-size: 15px;
    color: #0f766e;
    line-height: 1.5;
    font-weight: 500;
  }

  .footer {
    margin-top: 48px;
    font-size: 11px;
    color: #a1a1aa;
    text-align: center;
  }

  /* Fade transitions */
  .fade-in {
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="quiz-container" id="app">

  <h1>The Flavour Quiz</h1>
  <p class="subtitle">A product owner starts a new AI feature. Four questions determine the design calibration. No designer in the room required.</p>

  <div class="progress-track">
    <div class="progress-fill" id="progress" style="width: 0%"></div>
  </div>

  <div class="steps" id="steps"></div>

  <!-- Questions -->
  <div class="question-area" id="questionArea"></div>

  <!-- Result -->
  <div class="result" id="resultArea"></div>
</div>

<script>
const QUESTIONS = [
  {
    label: "Question 1 of 4",
    text: "What vertical is this feature for?",
    options: [
      { id: "gp", title: "GP / Specialist", desc: "Private consultation, desktop-first, reflective pace" },
      { id: "pharma", title: "Pharmacist", desc: "Counter-facing, POS / touch, rapid patient turnover" },
      { id: "nurse", title: "Nurse / Paramedic", desc: "Mobile, home visits, hands often occupied" },
      { id: "dentist", title: "Dentist", desc: "Chairside, POS / touch, procedure-driven workflow" },
      { id: "residential", title: "Residential Care", desc: "Shared devices, shift-based, multi-patient context" }
    ]
  },
  {
    label: "Question 2 of 4",
    text: "What form factor family?",
    options: [
      { id: "desktop", title: "Desktop EMR", desc: "Keyboard + mouse, large screen, seated workflow" },
      { id: "pos", title: "POS / Touch", desc: "Touchscreen, standing, counter-facing" },
      { id: "mobile", title: "Mobile / Hybrid", desc: "Phone or tablet, on the move, intermittent attention" }
    ]
  },
  {
    label: "Question 3 of 4",
    text: "What's the risk level of this AI feature?",
    options: [
      { id: "low", title: "Low", desc: "Administrative — scheduling, reminders, note formatting" },
      { id: "medium", title: "Medium", desc: "Clinical support — documentation, coding suggestions, summaries" },
      { id: "high", title: "High", desc: "Clinical decision — medication checks, diagnosis flags, treatment suggestions" }
    ]
  },
  {
    label: "Question 4 of 4",
    text: "What role does the AI play?",
    options: [
      { id: "automate", title: "Automate", desc: "AI handles the task, human reviews output" },
      { id: "assist", title: "Assist", desc: "AI suggests, human decides and acts" },
      { id: "observe", title: "Observe + Flag", desc: "AI monitors and alerts, human owns the workflow entirely" }
    ]
  }
];

// Calibration logic
function getCalibrations(answers) {
  const vertical = answers[0];
  const formFactor = answers[1];
  const risk = answers[2];
  const role = answers[3];

  // Base calibrations by form factor
  let transparency, userControl, errorPrevention, inputMode, character;

  // Transparency: how much the AI explains itself
  if (risk === "high") {
    transparency = formFactor === "pos" ? { level: 95, label: "Maximum", color: "#dc2626" } :
                   formFactor === "mobile" ? { level: 85, label: "High", color: "#d97706" } :
                   { level: 75, label: "High", color: "#d97706" };
  } else if (risk === "medium") {
    transparency = { level: 55, label: "Moderate", color: "#0d9488" };
  } else {
    transparency = { level: 30, label: "Low", color: "#22c55e" };
  }

  // User Control: override friction
  if (risk === "high" && (vertical === "pharma" || vertical === "dentist")) {
    userControl = { level: 95, label: "Confirm-before", color: "#dc2626" };
  } else if (risk === "high") {
    userControl = { level: 70, label: "Override + note", color: "#d97706" };
  } else if (role === "automate") {
    userControl = { level: 40, label: "Review output", color: "#0d9488" };
  } else {
    userControl = { level: 55, label: "Dismiss / adjust", color: "#0d9488" };
  }

  // Error Prevention: how aggressively the system blocks
  if (risk === "high" && (vertical === "pharma" || vertical === "dentist")) {
    errorPrevention = { level: 95, label: "Block + escalate", color: "#dc2626" };
  } else if (risk === "high") {
    errorPrevention = { level: 65, label: "Warn + continue", color: "#d97706" };
  } else if (risk === "medium") {
    errorPrevention = { level: 45, label: "Soft warning", color: "#0d9488" };
  } else {
    errorPrevention = { level: 20, label: "Undo available", color: "#22c55e" };
  }

  // Input mode by form factor
  inputMode = formFactor === "desktop" ? "Keyboard · Voice optional" :
              formFactor === "pos" ? "Touch · Scan · Voice" :
              "Voice · Touch · Gesture";

  // Character by vertical
  character = (vertical === "pharma" || vertical === "dentist") ? "Clinical · Precise · Deferential" :
              (vertical === "nurse" || vertical === "residential") ? "Supportive · Concise · Ambient" :
              "Professional · Neutral · Unobtrusive";

  return { transparency, userControl, errorPrevention, inputMode, character };
}

function getPatterns(answers) {
  const risk = answers[2];
  const role = answers[3];
  const vertical = answers[0];
  const patterns = [];

  if (role === "observe" || risk === "high") {
    patterns.push({ name: "AlertExplanation", type: "default" });
  }
  if (risk === "high") {
    patterns.push({ name: "OverrideControl", type: "warn" });
    patterns.push({ name: "AuditableDecision", type: "danger" });
  }
  if (role === "assist") {
    patterns.push({ name: "AssistedEntry", type: "default" });
    patterns.push({ name: "SuggestionReview", type: "default" });
  }
  if (role === "automate") {
    patterns.push({ name: "SuggestionReview", type: "default" });
  }
  if (vertical === "pharma") {
    patterns.push({ name: "InteractionCheck", type: "warn" });
    patterns.push({ name: "DispenseFlow", type: "default" });
  }
  if (vertical === "gp") {
    patterns.push({ name: "ConsultationCapture", type: "default" });
  }
  if (vertical === "nurse" || vertical === "residential") {
    patterns.push({ name: "VoiceCapture", type: "default" });
  }

  return patterns;
}

function getConstraints(answers) {
  const risk = answers[2];
  const vertical = answers[0];
  const formFactor = answers[1];
  const constraints = [];

  if (risk === "high") {
    constraints.push("EU AI Act: High-risk classification. MDR Article 11 applies if medical device. Full audit trail required.");
  }
  if (vertical === "pharma") {
    constraints.push("Last checkpoint in care chain — no safety net downstream. Override must be mandatory-reason, logged, and traceable.");
  }
  if (formFactor === "mobile") {
    constraints.push("Intermittent connectivity. AI must degrade gracefully — cache decisions locally, sync when online.");
  }
  if (formFactor === "pos") {
    constraints.push("Touch-first. All AI interactions must be completable with one hand. No hover states, no right-click.");
  }

  return constraints;
}

// State
let currentStep = 0;
let answers = [null, null, null, null];

// Auto-suggest form factor based on vertical
const verticalToFormFactor = {
  gp: "desktop",
  pharma: "pos",
  nurse: "mobile",
  dentist: "pos",
  residential: "mobile"
};

// Render
function renderSteps() {
  const container = document.getElementById("steps");
  container.innerHTML = "";
  for (let i = 0; i < 4; i++) {
    const dot = document.createElement("div");
    dot.className = "step-dot" + (i === currentStep ? " active" : "") + (answers[i] !== null && i < currentStep ? " done" : "");
    dot.textContent = answers[i] !== null && i < currentStep ? "✓" : (i + 1);
    container.appendChild(dot);
  }
}

function renderQuestion() {
  const area = document.getElementById("questionArea");
  const q = QUESTIONS[currentStep];

  // Auto-suggest form factor if we just answered vertical
  if (currentStep === 1 && answers[0] !== null && answers[1] === null) {
    answers[1] = verticalToFormFactor[answers[0]];
  }

  let html = `<div class="fade-in">
    <div class="question-label">${q.label}</div>
    <div class="question-text">${q.text}</div>
    <div class="options">`;

  q.options.forEach(opt => {
    const selected = answers[currentStep] === opt.id ? " selected" : "";
    html += `<div class="option${selected}" onclick="selectOption('${opt.id}')">
      <div class="option-radio"></div>
      <div class="option-content">
        <div class="option-title">${opt.title}</div>
        <div class="option-desc">${opt.desc}</div>
      </div>
    </div>`;
  });

  html += `</div>`;

  // Navigation
  html += `<div class="nav">`;
  if (currentStep > 0) {
    html += `<button class="btn btn-back" onclick="goBack()">Back</button>`;
  } else {
    html += `<div></div>`;
  }
  html += `<button class="btn btn-next" id="btnNext" onclick="goNext()" ${answers[currentStep] === null ? 'disabled' : ''}>
    ${currentStep === 3 ? 'See calibration' : 'Next'}
  </button>`;
  html += `</div></div>`;

  area.innerHTML = html;
  area.style.display = "block";
  document.getElementById("resultArea").classList.remove("visible");
}

function selectOption(id) {
  answers[currentStep] = id;
  renderQuestion();
  renderSteps();
}

function goNext() {
  if (answers[currentStep] === null) return;
  if (currentStep < 3) {
    currentStep++;
    updateProgress();
    renderSteps();
    renderQuestion();
  } else {
    showResult();
  }
}

function goBack() {
  if (currentStep > 0) {
    currentStep--;
    updateProgress();
    renderSteps();
    renderQuestion();
  }
}

function updateProgress() {
  const pct = (currentStep / 4) * 100;
  document.getElementById("progress").style.width = pct + "%";
}

function getVerticalName(id) {
  return QUESTIONS[0].options.find(o => o.id === id)?.title || id;
}
function getFormFactorName(id) {
  return QUESTIONS[1].options.find(o => o.id === id)?.title || id;
}
function getRiskName(id) {
  return QUESTIONS[2].options.find(o => o.id === id)?.title || id;
}
function getRoleName(id) {
  return QUESTIONS[3].options.find(o => o.id === id)?.title || id;
}

function showResult() {
  document.getElementById("progress").style.width = "100%";
  document.getElementById("questionArea").style.display = "none";

  const cal = getCalibrations(answers);
  const patterns = getPatterns(answers);
  const constraints = getConstraints(answers);

  // Update steps to all done
  for (let i = 0; i < 4; i++) {
    const dots = document.querySelectorAll(".step-dot");
    dots[i].className = "step-dot done";
    dots[i].textContent = "✓";
  }

  let html = `<div class="fade-in">
    <div class="result-header">
      <h2>Your Design Calibration</h2>
      <p>${getVerticalName(answers[0])} · ${getFormFactorName(answers[1])} · ${getRiskName(answers[2])} risk · ${getRoleName(answers[3])}</p>
    </div>

    <!-- Principle calibrations -->
    <div class="config-card">
      <div class="config-card-header">Principle Calibrations</div>
      <div class="config-card-body">
        ${renderCalibrationRow("Transparency", cal.transparency)}
        ${renderCalibrationRow("User Control", cal.userControl)}
        ${renderCalibrationRow("Error Prevention", cal.errorPrevention)}
      </div>
    </div>

    <!-- Interaction context -->
    <div class="config-card">
      <div class="config-card-header">Interaction Context</div>
      <div class="config-card-body">
        <div class="calibration-row">
          <div class="calibration-label">Input mode</div>
          <div style="flex:1; font-size:14px; color:#3f3f46;">${cal.inputMode}</div>
        </div>
        <div class="calibration-row">
          <div class="calibration-label">AI character</div>
          <div style="flex:1; font-size:14px; color:#3f3f46;">${cal.character}</div>
        </div>
      </div>
    </div>

    <!-- Patterns -->
    <div class="config-card">
      <div class="config-card-header">Recommended Patterns</div>
      <div class="config-card-body">
        <div class="pattern-list">
          ${patterns.map(p => `<span class="pattern-chip ${p.type === 'warn' ? 'warn' : p.type === 'danger' ? 'danger' : ''}">${p.name}</span>`).join("")}
        </div>
      </div>
    </div>`;

  // Constraints
  if (constraints.length > 0) {
    constraints.forEach(c => {
      html += `<div class="constraint-note">${c}</div>`;
    });
  }

  html += `
    <div class="takeaway">
      <p>Same design system. Same component library. Different configuration.<br>
      That's how you scale design decisions without a designer in every room.</p>
    </div>

    <div style="text-align:center;">
      <button class="btn btn-restart" onclick="restart()">Try another combination</button>
    </div>

    <div class="footer">
      Concept tool — demonstrates the principle, not a production artifact.<br>
      The Flavour Quiz · Corilus Round 3
    </div>
  </div>`;

  const resultArea = document.getElementById("resultArea");
  resultArea.innerHTML = html;
  resultArea.classList.add("visible");
}

function renderCalibrationRow(label, data) {
  return `<div class="calibration-row">
    <div class="calibration-label">${label}</div>
    <div class="calibration-bar-track">
      <div class="calibration-bar-fill" style="width:${data.level}%; background:${data.color};"></div>
    </div>
    <div class="calibration-value" style="color:${data.color};">${data.label}</div>
  </div>`;
}

function restart() {
  currentStep = 0;
  answers = [null, null, null, null];
  updateProgress();
  renderSteps();
  renderQuestion();
}

// Init
renderSteps();
renderQuestion();
</script>

</body>
</html>
